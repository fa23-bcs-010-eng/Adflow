<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adflow AI Chatbot</title>
  <link rel="stylesheet" href="/web/styles.css" />
</head>
<body>
  <button id="ai-toggle" class="ai-toggle" aria-controls="chat-widget" aria-expanded="false">
    <span class="icon" aria-hidden="true">AI</span>
    <span id="ai-toggle-label">AI Mode</span>
  </button>

  <aside id="chat-widget" class="chat-widget" aria-hidden="true">
    <main class="chat-shell">
      <header class="chat-header">
        <div>
          <h1>Adflow AI Agent</h1>
          <p>Ask for the current time in any city.</p>
        </div>
        <button id="chat-close" class="chat-close" type="button" aria-label="Close chatbot">x</button>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chat-form" class="chat-form">
        <input
          id="chat-input"
          type="text"
          placeholder="Try: What time is it in Karachi?"
          autocomplete="off"
          required
        />
        <button id="send-btn" type="submit">Send</button>
      </form>
    </main>
  </aside>

  <script src="/web/app.js"></script>
</body>
</html>
